#spring.application.name=leonAdmin



server:
  port: 8180
  servlet:
    context-path: /yf

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/leondb?useSSL=false&serverTimezone=UTC
    username: root
    password: yangfei
    type: com.alibaba.druid.pool.DruidDataSource      #数据库连接池
    druid:
      initial-size: 5                   #初始化大小
      min-idle: 10                      #最小链接数
      max-active: 5                     #最大链接数
      max-wait: 60000                   #获取链接时的最大等待时间
      validation-query: select 1        #检测链接是否有效的SQL语句
      test-on-borrow: true              #申请链接时执行validationquery
      test-wile-idle: true              #申请连接如果空闲时间大于timeBetweenEvictionRunsMillis
      test-on-return: false             #归还链接时执行validationQuery检测链接是否有效，默认false,开启后会减低性能，因为每次归还连接时，都会先执行验证 SQL。如果验证失败，该连接会被丢弃并创建一个新连接，而不是放入空闲池中


mybatis:
  type-aliases-package: com.yf.leonadmin.entity
  mapper-locations: classpath*:mapper/*Mapper.xml